services:
  server:
    build: ./server
    container_name: server

    ports:
      - "3000:3000"

    env_file:
      - ./server/.env

  client:
    build:
      context: ./client
      args:
        VITE_API_URL: http://localhost:3000/api

    container_name: client

    ports:
      - "5173:80"

    depends_on:
      - server